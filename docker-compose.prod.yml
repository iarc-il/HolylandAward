services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: holyland_db_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - holyland_network
    restart: always

  # Backend API — pre-built image from GHCR
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/iarc-il/holylandaward/backend:latest}
    container_name: holyland_backend_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - holyland_network
    restart: always

  # Frontend (Production) — pre-built image from GHCR
  # VITE_ variables are baked in at CI build time; no build-args needed here.
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/iarc-il/holylandaward/frontend:latest}
    container_name: holyland_frontend_prod
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - holyland_network
    restart: always

volumes:
  postgres_data:

networks:
  holyland_network:
    driver: bridge
