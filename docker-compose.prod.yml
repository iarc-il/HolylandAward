# docker-compose.prod.yml
# Production stack. Pulls the pre-built :latest images from GHCR.
# Served by Nginx Proxy Manager at https://holylandaward.iarc.org
# (NPM forwards that host -> the frontend container :80; frontend nginx serves
#  the SPA and proxies /api/* -> backend:8000).
#
# Reuses the EXISTING live DB volume (holyland_postgres_data) — no migration.
# Verify the volume name on the server (docker volume ls) before first start. See DEPLOYMENT.md.

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: holyland_db_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - holyland_network
    restart: always

  # Backend API — pre-built image from GHCR
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/iarc-il/holylandaward/backend:latest}
    container_name: holyland_backend_prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      # CORS origin — must be https://holylandaward.iarc.org in production.
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - holyland_network
    restart: always

  # Frontend (Production) — pre-built nginx image from GHCR.
  # VITE_ variables are baked in at CI build time; no runtime envs needed.
  # Nothing is published on the host — NPM reaches this container on :80 via nginx_proxy_default.
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/iarc-il/holylandaward/frontend:latest}
    container_name: holyland_frontend_prod
    depends_on:
      - backend
    networks:
      - holyland_network        # reach backend:8000 (internal)
      - nginx_proxy_default     # reachable by Nginx Proxy Manager
    restart: always

volumes:
  postgres_data:
    external: true
    # Existing LIVE production volume — reused as-is (no migration, no data loss).
    name: holyland_postgres_data

networks:
  holyland_network:
    driver: bridge
  # Shared network that Nginx Proxy Manager (nginx_proxy-app-1) is attached to.
  nginx_proxy_default:
    external: true
